name: Sync Upstream

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync with upstream main
        id: sync
        run: |
          git remote remove upstream || true
          git remote add upstream https://github.com/nexu-io/open-design.git
          git fetch upstream
          git checkout main
          if git merge upstream/main --no-edit; then
            git push origin main
            echo "sync_status=merged" >> "$GITHUB_OUTPUT"
          else
            git merge --abort || true
            echo "sync_status=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Open conflict issue
        if: steps.sync.outputs.sync_status == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `[sync-upstream] Merge conflict on ${today}`;
            const body = [
              'Automatic upstream sync hit merge conflicts.',
              '',
              'Action required:',
              '1. fetch upstream/main',
              '2. merge locally and resolve conflicts',
              '3. run validation',
              '4. push to fork main',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['sync', 'needs-review']
            });
