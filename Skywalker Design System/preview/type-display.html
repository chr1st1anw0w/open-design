<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Type — Display & Headings</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 20px 24px; background: var(--bg-canvas); color: var(--fg-primary); }
  .stack { display:flex; flex-direction:column; gap: 14px; }
  .row { display:flex; align-items:baseline; gap: 16px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 12px; }
  .row:last-child { border-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); width: 110px; flex: none; letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="stack">
  <div class="row"><span class="meta">DISPLAY · 80/300</span><span class="sw-display">Build the future</span></div>
  <div class="row"><span class="meta">H1 · 60/600</span><span class="sw-h1">Selected Work</span></div>
  <div class="row"><span class="meta">H3 · 40/600</span><span class="sw-h3">AI-native interfaces</span></div>
  <div class="row"><span class="meta">H5 · 24/600</span><span class="sw-h5">Skywalker MCP Suite</span></div>
</div>
</body>
</html>
