<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Colors — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 16px; background: var(--bg-canvas); }
  .row { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
  .sw { aspect-ratio: 1/1.4; border-radius: 8px; padding: 8px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--border-default); font-family: var(--font-mono); font-size: 10px; }
  .sw .n { letter-spacing: -0.01em; }
  .sw .h { opacity: .55; font-size: 9px; }
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:#fafbfb;color:#091e42"><span class="n">N10</span><span class="h">fafbfb</span></div>
  <div class="sw" style="background:#f5f6f7;color:#091e42"><span class="n">N20</span><span class="h">f5f6f7</span></div>
  <div class="sw" style="background:#ebedf0;color:#091e42"><span class="n">N30</span><span class="h">ebedf0</span></div>
  <div class="sw" style="background:#dfe2e6;color:#091e42"><span class="n">N40</span><span class="h">dfe2e6</span></div>
  <div class="sw" style="background:#c2c7d0;color:#091e42"><span class="n">N50</span><span class="h">c2c7d0</span></div>
  <div class="sw" style="background:#a6aebb;color:#091e42"><span class="n">N70</span><span class="h">a6aebb</span></div>
  <div class="sw" style="background:#7a8699;color:#fff"><span class="n">N100</span><span class="h">7a8699</span></div>
  <div class="sw" style="background:#505f79;color:#fff"><span class="n">N400</span><span class="h">505f79</span></div>
  <div class="sw" style="background:#243757;color:#fff"><span class="n">N700</span><span class="h">243757</span></div>
  <div class="sw" style="background:#091e42;color:#fff"><span class="n">N900</span><span class="h">091e42</span></div>
  <div class="sw" style="background:#000000;color:#fff;border-color:rgba(255,255,255,0.18)"><span class="n">Ink</span><span class="h">000000</span></div>
</div>
</body>
</html>
