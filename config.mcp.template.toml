[mcp_servers.puppeteer]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-puppeteer"]
enabled = true

[mcp_servers.puppeteer.env]
NODE_ENV = "production"
HEADLESS = "true"

[mcp_servers.desktop-commander]
command = "npx"
args = ["-y", "@wonderwhy-er/desktop-commander"]
enabled = true

[mcp_servers.obsidian-git]
command = "npx"
args = ["-y", "mcp-obsidian", "/Users/christianwu/Library/Mobile Documents/iCloud~md~obsidian/Documents/Git"]
enabled = true

[mcp_servers.obsidian-git.env]
OBSIDIAN_VAULT_PATH = "/Users/christianwu/Library/Mobile Documents/iCloud~md~obsidian/Documents/Git"

[mcp_servers.chrome-devtools]
command = "npx"
args = ["chrome-devtools-mcp@latest"]
enabled = true

[mcp_servers.notebooklm-mcp]
command = "notebooklm-mcp"
args = []
enabled = true

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]
enabled = true

[mcp_servers.memory.env]
MEMORY_MAX_ENTRIES = "1000"
MEMORY_CLEANUP_INTERVAL_MS = "300000"
MEMORY_IDLE_TIMEOUT_MS = "1800000"
MEMORY_CHUNK_SIZE_BYTES = "20971520"
MEMORY_BUFFER_MIN_KB = "512"
MEMORY_BUFFER_MAX_MB = "32"
NODE_ENV = "production"

[mcp_servers.fetch]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-fetch"]
enabled = true

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem"]
enabled = true

[mcp_servers.gitnexus]
command = "npx"
args = ["-y", "gitnexus@latest", "mcp"]
enabled = true

[mcp_servers.notion-api]
command = "npx"
args = ["-y", "@notionhq/notion-mcp-server"]
enabled = true

[mcp_servers.notion-api.env]
OPENAPI_MCP_HEADERS = "{\"Authorization\": \"Bearer ${NOTION_TOKEN}\", \"Notion-Version\": \"2022-06-28\", \"Content-Type\": \"application/json\"}"
NOTION_DATABASE_ID = "${NOTION_DATABASE_ID}"

[mcp_servers."@21st-dev/magic"]
command = "npx"
args = ["-y", "@21st-dev/magic@latest"]
enabled = true

[mcp_servers."@21st-dev/magic".env]
API_KEY = "${MAGIC_API_KEY}"
