<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Skills Gallery</title>

  <style>
    /* =========================
       Replit-deck (helix) vibe:
       - near-white bg
       - ink fg
       - muted gray
       - hairline border
       - electric blue accent
       - display: Inter-ish, body: system-ui, mono: JetBrains-like
       ========================= */

    :root {
      --bg: #fafafa;
      --fg: #19191c;
      --muted: #6e6e73;
      --border: #e4e4e7;
      --accent: #5889fe;

      --surface: #ffffff;
      --surface-2: #f5f5f7;

      --shadow: 0 1px 0 rgba(10, 10, 12, 0.04), 0 8px 24px rgba(10, 10, 12, 0.06);

      --radius: 14px;
      --radius-sm: 12px;

      --maxw: 1200px;

      --font-display: ui-sans-serif, system-ui, -apple-system, "SF Pro Display", "SF Pro Text",
        "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      --font-body: ui-sans-serif, system-ui, -apple-system, "SF Pro Text",
        "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      --font-mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

      /* thumbnail sizing (overridden by data-thumb) */
      --thumb-h: 148px; /* medium default: 16:9-ish area inside card */
      --grid-min: 260px;
    }

    html[data-theme="dark"] {
      --bg: #0f1115;
      --fg: #f2f3f5;
      --muted: #a0a4ad;
      --border: #262a33;
      --accent: #7aa2ff;

      --surface: #141824;
      --surface-2: #101422;

      --shadow: 0 1px 0 rgba(0,0,0,0.3), 0 18px 50px rgba(0,0,0,0.40);
    }

    html[data-thumb="sm"] { --thumb-h: 120px; }
    html[data-thumb="md"] { --thumb-h: 148px; }
    html[data-thumb="lg"] { --thumb-h: 190px; }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; color: inherit; }

    /* ---------- Header (sticky) ---------- */
    .topbar-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(12px);
      background: color-mix(in oklch, var(--bg) 85%, transparent);
      border-bottom: 1px solid var(--border);
    }

    .topbar {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 650;
      letter-spacing: -0.02em;
      line-height: 1.2;
      white-space: nowrap;
    }

    .brand .meta {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      min-width: min(420px, 72vw);
      box-shadow: 0 1px 0 rgba(0,0,0,0.02);
    }

    html[data-theme="dark"] .search { box-shadow: none; }

    .search .k {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      user-select: none;
    }

    .search input {
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      font-size: 14px;
    }

    .chipbar {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .seg {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      background: var(--surface);
    }
    .seg button {
      border: none;
      background: transparent;
      padding: 8px 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
    }
    .seg button[aria-pressed="true"] {
      color: var(--fg);
      background: color-mix(in oklch, var(--accent) 12%, var(--surface));
    }

    .iconbtn {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 999px;
      padding: 8px 10px;
      cursor: pointer;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      box-shadow: 0 1px 0 rgba(0,0,0,0.02);
    }
    html[data-theme="dark"] .iconbtn { box-shadow: none; }
    .iconbtn .label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ---------- Main ---------- */
    .main {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 18px 18px 48px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--grid-min), 1fr));
      gap: 14px;
    }

    /* content-visibility for big lists */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 0 rgba(10,10,12,0.03);
      transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
      content-visibility: auto;
      contain-intrinsic-size: 320px 380px;
    }
    html[data-theme="dark"] .card { box-shadow: none; }

    .card:hover {
      transform: translateY(-1px);
      border-color: color-mix(in oklch, var(--accent) 18%, var(--border));
      box-shadow: var(--shadow);
    }

    .thumb {
      position: relative;
      width: 100%;
      height: var(--thumb-h);
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      overflow: hidden;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      display: block;
      transform: scale(1.0);
      transition: transform 180ms ease;
    }
    .card:hover .thumb img { transform: scale(1.02); }

    .thumb .placeholder {
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 18px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      user-select: none;
    }

    .body {
      padding: 12px 12px 12px;
      display: grid;
      gap: 10px;
    }

    .title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 650;
      letter-spacing: -0.01em;
      line-height: 1.25;
      word-break: break-word;
    }

    .path {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.02em;
      color: var(--muted);
      line-height: 1.35;
      word-break: break-word;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding-top: 4px;
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      color: var(--fg);
      transition: background 120ms ease, border-color 120ms ease;
      user-select: none;
      white-space: nowrap;
    }

    .btn.secondary { color: var(--muted); }
    .btn.primary {
      border-color: color-mix(in oklch, var(--accent) 40%, var(--border));
      background: color-mix(in oklch, var(--accent) 10%, var(--surface));
    }

    .btn:hover {
      border-color: color-mix(in oklch, var(--accent) 22%, var(--border));
      background: color-mix(in oklch, var(--accent) 8%, var(--surface));
    }

    .btn:active { transform: translateY(1px); }

    .btn .mono {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
    }

    /* ---------- Modal ---------- */
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 50;
    }
    .modal[aria-hidden="false"] { display: block; }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
    }
    html[data-theme="dark"] .overlay { background: rgba(0,0,0,0.65); }

    .sheet {
      position: absolute;
      inset: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }

    .modalbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 12px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in oklch, var(--surface) 90%, transparent);
      backdrop-filter: blur(10px);
      min-width: 0;
    }

    .modalbar .left {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .modalbar .name {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 650;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(70vw, 720px);
    }
    .modalbar .sub {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(70vw, 720px);
    }

    .modalbar .right { display: flex; gap: 8px; align-items: center; }

    .closebtn {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .frame {
      min-height: 0;
      background: var(--surface-2);
    }
    .frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }

    /* ---------- Toast ---------- */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 12px;
      box-shadow: var(--shadow);
      z-index: 60;
      display: none;
      max-width: min(92vw, 780px);
    }
    .toast[aria-hidden="false"] { display: block; }

    .toast .t {
      font-size: 13px;
      color: var(--fg);
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .toast .t .mono {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ---------- Small screens ---------- */
    @media (max-width: 680px) {
      .topbar { grid-template-columns: 1fr; }
      .controls { justify-content: flex-start; }
      .search { min-width: 100%; }
      .sheet { inset: 10px; }
      .modalbar .name { max-width: 86vw; }
      .grid { gap: 12px; }
    }
  </style>
</head>

      <div class="brand">
        <h1>Skills Gallery</h1>

      </div>

      <div class="controls">
        <div class="search" role="search">

  <main class="main">
    <div class="grid" id="grid"></div>

  <!-- Modal -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="overlay" id="overlay"></div>
    <div class="sheet" role="dialog" aria-modal="true" aria-label="Preview">
      <div class="modalbar">
        <div class="left">
          <div class="name" id="modalName">—</div>
          <div class="sub" id="modalSub">—</div>
        </div>
        <div class="right">
          <a class="btn primary" id="modalOpen" href="#" target="_blank" rel="noopener">
            <span aria-hidden="true">↗</span> <span class="mono">New Tab</span>
          </a>
          <button class="closebtn" id="closeBtn" aria-label="Close">×</button>
        </div>
      </div>
      <div class="frame">
        <iframe
          id="frame"
          src="about:blank"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"
          referrerpolicy="no-referrer"
        ></iframe>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" aria-hidden="true">
    <div class="t">
      <span class="mono">Copied</span>
      <span id="toastMsg">—</span>
    </div>
  </div>

  <script>
    // ---------- Utils ----------
    const $ = (sel, el = document) => el.querySelector(sel);
    const $$ = (sel, el = document) => Array.from(el.querySelectorAll(sel));

    function titleFromStem(stem) {
      // remove extension already absent; convert underscores to spaces
      return String(stem || "").replace(/_/g, " ");
    }

    function titleFromStem(stem) {
      // remove extension already absent; convert underscores to spaces
      // 第一個底線之前是目錄名，之後是檔名，這裡我們統一把底線換成空格方便閱讀
      return String(stem || "").replace(/_/g, " ");
    }

    function normalize(s) {
      return (s || "").toString().toLowerCase();
    }

    function escapeHtml(s) {
      return (s || "").toString()
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // ---------- Theme + thumb size persistence ----------
    const THEME_KEY = "skillsGallery.theme";
    const THUMB_KEY = "skillsGallery.thumb";

    function setTheme(theme) {
      document.documentElement.dataset.theme = theme;
      localStorage.setItem(THEME_KEY, theme);
      $("#themeLabel").textContent = theme === "dark" ? "Dark" : "Light";
    }

    function initTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      if (saved === "light" || saved === "dark") return setTheme(saved);
      // default: follow system
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      setTheme(prefersDark ? "dark" : "light");
    }

    function setThumb(size) {
      document.documentElement.dataset.thumb = size; // sm/md/lg
      localStorage.setItem(THUMB_KEY, size);
      $$(".thumbSeg").forEach(b => b.setAttribute("aria-pressed", b.dataset.thumb === size ? "true" : "false"));
    }

    function initThumb() {
      const saved = localStorage.getItem(THUMB_KEY);
      if (saved === "sm" || saved === "md" || saved === "lg") return setThumb(saved);
      setThumb("md");
    }

    // ---------- Toast ----------
    let toastTimer = null;
    function showToast(msg, ms = 2400) {
      $("#toastMsg").textContent = msg;
      $("#toast").setAttribute("aria-hidden", "false");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        $("#toast").setAttribute("aria-hidden", "true");
      }, ms);
    }

    // ---------- Clipboard ----------
    async function copyText(text) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch (e) {
        // fallthrough to prompt
      }
      // Fallback
      window.prompt("Clipboard API 不支援，請手動複製：", text);
      return false;
    }

    // ---------- Modal ----------
    const modal = $("#modal");
    const overlay = $("#overlay");
    const closeBtn = $("#closeBtn");
    const frame = $("#frame");
    const modalName = $("#modalName");
    const modalSub = $("#modalSub");
    const modalOpen = $("#modalOpen");

    let modalOpenRecord = null;

    function openModal(rec) {
      modalOpenRecord = rec;
      const name = titleFromStem(rec.stem);
      modalName.textContent = name || "(untitled)";
      modalSub.textContent = rec.html_src || "";
      modalOpen.href = rec.html_export || "#";

      // load iframe
      frame.src = rec.html_export || "about:blank";

      modal.setAttribute("aria-hidden", "false");
      // focus close for accessibility
      closeBtn.focus();
    }

    function closeModal() {
      modal.setAttribute("aria-hidden", "true");
      frame.src = "about:blank";
      modalOpenRecord = null;
    }

    overlay.addEventListener("click", closeModal);
    closeBtn.addEventListener("click", closeModal);
    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && modal.getAttribute("aria-hidden") === "false") {
        e.preventDefault();
        closeModal();
      }
    });

    // ---------- Render ----------
    const grid = $("#grid");
    const q = $("#q");
    const countLabel = $("#countLabel");

    function buildCard(rec) {
      const name = titleFromStem(rec.stem);
      const hasPng = rec.png_export && rec.png_export.trim().length > 0;

      const card = document.createElement("article");
      card.className = "card";

      const thumb = document.createElement("div");
      thumb.className = "thumb";
      thumb.title = "點擊預覽";

      if (hasPng) {
        const img = document.createElement("img");
        img.loading = "lazy";
        img.src = rec.png_export;
        img.alt = name;
        thumb.appendChild(img);
      } else {
        const ph = document.createElement("div");
        ph.className = "placeholder";
        ph.textContent = "截圖未產生";
        thumb.appendChild(ph);
      }

      thumb.addEventListener("click", () => openModal(rec));

      const body = document.createElement("div");
      body.className = "body";
      body.innerHTML = `
        <div class="title">${escapeHtml(name)}</div>
      `;

      const actions = document.createElement("div");
      actions.className = "actions";

      const openBtn = document.createElement("a");
      openBtn.className = "btn primary";
      openBtn.href = rec.html_export || "#";
      openBtn.target = "_blank";
      openBtn.rel = "noopener";
      openBtn.innerHTML = `<span aria-hidden="true">↗</span><span class="mono">Open HTML</span>`;
      openBtn.addEventListener("click", (e) => e.stopPropagation());

      actions.appendChild(openBtn);

      body.appendChild(actions);

      card.appendChild(thumb);
      card.appendChild(body);

      // for filtering
      card.dataset.search = normalize(`${rec.stem} ${name} ${rec.html_export}`);

      return card;
    }

    let cardNodes = [];

    function renderAll() {
      grid.innerHTML = "";
      cardNodes = RECORDS.map(rec => buildCard(rec));
      const frag = document.createDocumentFragment();
      cardNodes.forEach(n => frag.appendChild(n));
      grid.appendChild(frag);
      applyFilter();
    }

    function applyFilter() {
      const needle = normalize(q.value.trim());
      let shown = 0;

      for (const node of cardNodes) {
        const ok = !needle || node.dataset.search.includes(needle);
        node.style.display = ok ? "" : "none";
        if (ok) shown++;
      }

      countLabel.textContent = `${shown} / ${cardNodes.length}`;
    }

    q.addEventListener("input", applyFilter);

    // ---------- Controls ----------
    $("#themeBtn").addEventListener("click", () => {
      const cur = document.documentElement.dataset.theme || "light";
      setTheme(cur === "dark" ? "light" : "dark");
    });

    $$(".thumbSeg").forEach(btn => {
      btn.addEventListener("click", () => setThumb(btn.dataset.thumb));
    });

    // ---------- Boot ----------
    initTheme();
    initThumb();
    renderAll();

    // Optional: quick "/" to focus search
    window.addEventListener("keydown", (e) => {
      if (e.key === "/" && document.activeElement !== q) {
        e.preventDefault();
        q.focus();
      }
    });
  </script>
</body>
</html>
